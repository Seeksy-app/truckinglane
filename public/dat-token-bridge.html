<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DAT Token Sync</title>
    <style>
      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: #0b0d10;
        color: #f5f7fa;
      }
      .card {
        width: min(90vw, 360px);
        padding: 16px;
        border-radius: 10px;
        background: #111418;
        border: 1px solid #2a3138;
        text-align: center;
        line-height: 1.4;
      }
      .ok {
        color: #22c55e;
      }
      .err {
        color: #ef4444;
      }
    </style>
  </head>
  <body>
    <div id="status" class="card">Syncing DAT token...</div>
    <script>
      (function () {
        const statusEl = document.getElementById("status");

        function setStatus(message, ok) {
          statusEl.textContent = message;
          statusEl.className = "card " + (ok ? "ok" : "err");
        }

        function extractToken() {
          const hashParams = new URLSearchParams(window.location.hash.replace(/^#/, ""));
          const queryParams = new URLSearchParams(window.location.search);

          const fromHash =
            hashParams.get("access_token") ||
            hashParams.get("token") ||
            hashParams.get("id_token");
          if (fromHash) return fromHash;

          const fromQuery =
            queryParams.get("access_token") ||
            queryParams.get("token") ||
            queryParams.get("id_token");
          if (fromQuery) return fromQuery;

          return null;
        }

        function getParentOrigin() {
          const queryParams = new URLSearchParams(window.location.search);
          const origin = queryParams.get("tl_origin");
          return origin || window.location.origin;
        }

        const token = extractToken();
        const parentOrigin = getParentOrigin();

        if (window.opener) {
          if (token) {
            window.opener.postMessage({ type: "DAT_TOKEN_BRIDGE_RESULT", token }, parentOrigin);
            setStatus("DAT token captured. Returning...", true);
            setTimeout(() => window.close(), 1200);
          } else {
            const message = "Token not found in callback URL. Make sure DAT redirects back after login.";
            window.opener.postMessage({ type: "DAT_TOKEN_BRIDGE_RESULT", token: "", message }, parentOrigin);
            setStatus(message, false);
          }
        } else {
          setStatus("No parent window detected.", false);
        }
      })();
    </script>
  </body>
</html>
