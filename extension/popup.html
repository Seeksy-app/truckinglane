<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { width: 300px; font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #0f172a; color: #e2e8f0; padding: 16px; }
  .header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid #1e293b; }
  .title { font-size: 14px; font-weight: 700; color: #f59e0b; }
  .subtitle { font-size: 11px; color: #64748b; }
  .status-card { background: #1e293b; border-radius: 8px; padding: 12px; margin-bottom: 10px; }
  .status-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; }
  .status-label { font-size: 12px; color: #94a3b8; }
  .status-value { font-size: 12px; font-weight: 600; }
  .last-sync { font-size: 11px; color: #64748b; text-align: center; margin-bottom: 12px; }
  .btn { width: 100%; padding: 10px; border: none; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; background: #f59e0b; color: #0f172a; margin-bottom: 8px; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .info { font-size: 11px; color: #475569; text-align: center; margin-top: 8px; line-height: 1.5; }
  .note { font-size: 11px; color: #f59e0b; text-align: center; margin-top: 6px; }
</style>
</head>
<body>
  <div class="header">
    <div>
      <div class="title">TruckingLane Auto Sync</div>
      <div class="subtitle">D&amp;L Transport - Syncs every 30 min</div>
    </div>
  </div>
  <div class="status-card">
    <div class="status-row">
      <span class="status-label">Aljex Session</span>
      <span class="status-value" id="aljex-status">Checking...</span>
    </div>
    <div class="status-row">
      <span class="status-label">DAT Token</span>
      <span class="status-value" id="dat-status">Checking...</span>
    </div>
    <div class="status-row">
      <span class="status-label">Loads Scraped</span>
      <span class="status-value" id="loads-count" style="color:#f59e0b">-</span>
    </div>
  </div>
  <div class="last-sync" id="last-sync">Loading...</div>
  <button class="btn" id="sync-btn">Sync Now</button>
  <div class="note" id="tab-note"></div>
  <div class="info">Keep Aljex and DAT tabs open and logged in.<br>Everything else is automatic.</div>
  <script src="popup.js"></script>
</body>
</html>
